<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <nav class="navbar">
            <div class="logo">ShopEase</div>

            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Categories</a></li>
                <li><a href="#">Contact</a></li>
            </ul>

            <button class="btn">Login</button>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Discover Your Perfect Style</h1>
            <p>Shop the latest fashion trends with amazing deals.</p>
            <button class="btn">Shop Now</button>
        </div>
    </section>

    <!-- Products -->
    <section class="products">
        <h2>Featured Products</h2>

        <div class="product-grid">

            <div class="card">
                <img src="images/product1.jpg" alt="Product">
                <h3>Casual Shirt</h3>
                <p>$29.99</p>
            </div>

            <div class="card">
                <img src="images/product2.jpg" alt="Product">
                <h3>Running Shoes</h3>
                <p>$49.99</p>
            </div>

            <div class="card">
                <img src="images/product3.jpg" alt="Product">
                <h3>Smart Watch</h3>
                <p>$99.99</p>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 ShopEase. All Rights Reserved.</p>
    </footer>

</body>
</html>
